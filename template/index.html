<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Hospital Dra. Yuska</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { border-collapse: collapse; width: 50%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <h1>Gestão Hospitalar - Dra. Yuska</h1>
    
    <h2>Lista de Pessoas Cadastradas</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Telefone</th>
        </tr>
        {% for pessoa in lista_pessoas %}
        <tr>
            <td>{{ pessoa[0] }}</td>
            <td>{{ pessoa[1] }}</td>
            <td>{{ pessoa[2] }}</td>
        </tr>
        {% else %}
        <tr>
            <td colspan="3">Nenhuma pessoa encontrada no banco.</td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
