<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Dra. Yuska - Novo Atendimento</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 40px; background-color: #f5f7fb; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; margin-top: 0; }
        h2 { color: #34495e; font-size: 1.3rem; margin-top: 30px; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 1px solid #e0e0e0; }
        
        .form-group { margin-bottom: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; }
        
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #34495e; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.95rem; }
        input:focus, select:focus, textarea:focus { border-color: #2ecc71; outline: none; }
        
        /* Estilo do bloco de procedimento que será duplicado */
        .bloco-procedimento { 
            background: #f8fafc; 
            border: 1px solid #cbd5e1; 
            padding: 20px; 
            border-radius: 6px; 
            margin-bottom: 20px; 
            position: relative;
        }
        
        /* Botões */
        .btn-adicionar {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-block;
        }
        .btn-adicionar:hover { background-color: #2980b9; }

        .btn-remover-bloco {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            margin-top: 10px;
            float: right;
        }
        .btn-remover-bloco:hover { background-color: #c0392b; }
        
        .btn-container { display: flex; gap: 15px; margin-top: 30px; clear: both; }
        .btn-salvar { flex: 2; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .btn-salvar:hover { background-color: #27ae60; }
        .btn-voltar { flex: 1; display: block; text-align: center; padding: 12px; background-color: #7f8c8d; color: white; text-decoration: none; border-radius: 4px; font-size: 1rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Gestão Hospitalar - Dra. Yuska</h1>
    
    <form action="/novo_atendimento" method="POST">
        
        <h2>1. Dados Gerais do Atendimento</h2>
        <div class="grid-2">
            <div class="form-group">
                <label for="data">Data e Hora:</label>
                <input type="datetime-local" id="data" name="data" required>
            </div>
            <div class="form-group">
                <label for="duracao">Duração Total (minutos):</label>
                <input type="number" id="duracao" name="duracao" min="1" required>
            </div>
        </div>

        <div class="grid-3">
            <div class="form-group">
                <label for="paciente_id">ID Paciente:</label>
                <input type="number" id="paciente_id" name="paciente_id" required>
            </div>
            <div class="form-group">
                <label for="residente_id">ID Residente:</label>
                <input type="number" id="residente_id" name="residente_id" required>
            </div>
            <div class="form-group">
                <label for="preceptor_id">ID Preceptor:</label>
                <input type="number" id="preceptor_id" name="preceptor_id" required>
            </div>
        </div>

        <h2>2. Procedimentos Realizados</h2>
        
        <div id="container-procedimentos">
            
            <div class="bloco-procedimento">
                <div class="grid-3">
                    <div class="form-group">
                        <label>Procedimento:</label>
                        <select name="procedimento_id[]" required>
                            <option value="">-- Selecione --</option>
                            <option value="1">Sutura simples (Cód: 001)</option>
                            <option value="2">Coleta de Sangue (Cód: 002)</option>
                            <option value="3">Aplicação de Medicação (Cód: 003)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Quantidade:</label>
                        <input type="number" name="qtd_procedimento[]" min="1" value="1" required>
                    </div>
                    <div class="form-group">
                        <label>Tempo Real (min):</label>
                        <input type="number" name="tempo_real[]" min="1" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Observação / Intercorrências:</label>
                    <textarea name="observacao[]" rows="2" placeholder="Descreva alguma intercorrência..."></textarea>
                </div>
            </div>

        </div>

        <button type="button" class="btn-adicionar" onclick="adicionarProcedimento()">➕ Adicionar Outro Procedimento</button>

        <div class="btn-container">
            <a href="/" class="btn-voltar">Cancelar</a>
            <button type="submit" class="btn-salvar">Salvar Atendimento Completo</button>
        </div>

    </form>
</div>

<script>
    // Limite maximo
    const LIMITE_MAXIMO = 10;

    function adicionarProcedimento() {
        const container = document.getElementById("container-procedimentos");
        const totalProcedimentos = container.getElementsByClassName("bloco-procedimento").length;

        if (totalProcedimentos >= LIMITE_MAXIMO) {
            alert("Limite máximo de " + LIMITE_MAXIMO + " procedimentos por atendimento atingido!");
            return;
        }

        // HTML do novo bloco
        const novoBloco = document.createElement("div");
        novoBloco.className = "bloco-procedimento";
        novoBloco.innerHTML = `
            <div class="grid-3">
                <div class="form-group">
                    <label>Procedimento:</label>
                    <select name="procedimento_id[]" required>
                        <option value="">-- Selecione --</option>
                        <option value="1">Sutura simples (Cód: 001)</option>
                        <option value="2">Coleta de Sangue (Cód: 002)</option>
                        <option value="3">Aplicação de Medicação (Cód: 003)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantidade:</label>
                    <input type="number" name="qtd_procedimento[]" min="1" value="1" required>
                </div>
                <div class="form-group">
                    <label>Tempo Real (min):</label>
                    <input type="number" name="tempo_real[]" min="1" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Observação / Intercorrências:</label>
                <textarea name="observacao[]" rows="2" placeholder="Descreva alguma intercorrência..."></textarea>
            </div>
            <button type="button" class="btn-remover-bloco" onclick="removerBloco(this)">🗑️ Remover Este</button>
            <div style="clear: both;"></div>
        `;

        container.appendChild(novoBloco);
    }

    function removerBloco(botao) {
        // Remove o bloco pai do botão clicado
        botao.closest(".bloco-procedimento").remove();
    }
</script>

</body>
</html>
