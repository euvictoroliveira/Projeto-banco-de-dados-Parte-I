<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Dra. Yuska - Atualização Geral</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 40px; background-color: #f5f7fb; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; }
        h2 { color: #34495e; font-size: 1.2rem; margin-top: 25px; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 1px solid #e0e0e0; }
        
        /* Área de Filtros */
        .secao-filtro { 
            background: #eef2f7; 
            padding: 20px; 
            border-radius: 6px; 
            margin-bottom: 25px;
            border: 1px solid #d2d9e4;
        }
        .grid-filtro { display: grid; grid-template-columns: 1fr 2fr auto; gap: 15px; align-items: flex-end; }
        
        .form-group { margin-bottom: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #34495e; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.95rem; }
        input:focus, select:focus { border-color: #3498db; outline: none; }
        
        .btn-buscar { padding: 10px 20px; background-color: #3498db; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; height: 41px; }
        .btn-buscar:hover { background-color: #2980b9; }
        
        .btn-container { display: flex; gap: 15px; margin-top: 30px; }
        .btn-salvar { flex: 2; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .btn-salvar:hover { background-color: #27ae60; }
        .btn-voltar { flex: 1; display: block; text-align: center; padding: 12px; background-color: #7f8c8d; color: white; text-decoration: none; border-radius: 4px; font-size: 1rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Gestão Hospitalar - Dra. Yuska</h1>
    
    <div class="secao-filtro">
        <h2>🔍 Selecione quem deseja atualizar</h2>
        <div class="grid-filtro">
            <div class="form-group">
                <label for="tipo_usuario">Tipo de Cadastro:</label>
                <select id="tipo_usuario" name="tipo_usuario" onchange="atualizarListaSelecao()">
                    <option value="paciente">Paciente</option>
                    <option value="residente">Médico Residente</option>
                    <option value="preceptor">Médico Preceptor</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="id_filtrado">Escolha o ID / Nome:</label>
                <select id="id_filtrado" name="id_filtrado">
                    </select>
            </div>
            
            <button type="button" class="btn-buscar">Carregar Dados</button>
        </div>
    </div>

    <form action="/atualizar_cadastro" method="POST">
        
        <input type="hidden" id="tipo_selecionado" name="tipo_selecionado" value="paciente">
        <input type="hidden" id="usuario_id" name="usuario_id" value="">

        <h2>Dados Cadastrais do Selecionado</h2>
        
        <div class="form-group">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" placeholder="Nome atual do cadastrado" required>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label for="telefone">Telefone / Celular:</label>
                <input type="text" id="telefone" name="telefone" placeholder="(00) 00000-0000">
            </div>
            <div class="form-group">
                <label for="documento">Documento de Identificação (CPF / CRM):</label>
                <input type="text" id="documento" name="documento" placeholder="CPF do paciente ou CRM do médico">
            </div>
        </div>

        <h2>Dados Exclusivos (Se for Paciente)</h2>
        <div class="grid-2">
            <div class="form-group">
                <label for="plano_saude">Plano de Saúde:</label>
                <input type="text" id="plano_saude" name="plano_saude" placeholder="Ex: SUS, Unimed, Bradesco">
            </div>
            <div class="form-group">
                <label for="endereco">Endereço Residencial:</label>
                <input type="text" id="endereco" name="endereco" placeholder="Rua, Número, Bairro">
            </div>
        </div>

        <h2>Dados Exclusivos (Se for Médico)</h2>
        <div class="grid-2">
            <div class="form-group">
                <label for="especialidade">Especialidade / Ano de Residência:</label>
                <input type="text" id="especialidade" name="especialidade" placeholder="Ex: Cardiologia, R1, Pediatria">
            </div>
            <div class="form-group">
                <label for="titulacao">Titulação (Apenas Preceptor):</label>
                <input type="text" id="titulacao" name="titulacao" placeholder="Ex: Doutor, Mestre, Especialista">
            </div>
        </div>

        <div class="btn-container">
            <a href="/" class="btn-voltar">Cancelar</a>
            <button type="submit" class="btn-salvar">Confirmar e Atualizar Dados</button>
        </div>

    </form>
</div>
      //parte do gemini para implementar exemplos para teste (corrigida)
<script>
    // Dados de exemplo
 const dadosBanco = {
        paciente: {{ pacientes_json | safe }},
        residente: {{ residentes_json | safe }},
        preceptor: {{ preceptores_json | safe }}
    };

    function atualizarListaSelecao() {
        const tipoUsuario = document.getElementById("tipo_usuario").value;
        const selectIdFiltrado = document.getElementById("id_filtrado");
        const tipoSelecionadoHidden = document.getElementById("tipo_selecionado");
        
        tipoSelecionadoHidden.value = tipoUsuario;
        selectIdFiltrado.innerHTML = "";

        const opcoesFiltradas = dadosBanco[tipoUsuario] || [];

        opcoesFiltradas.forEach(item => {
            const opt = document.createElement("option");
            opt.value = item.id;
            opt.textContent = `ID: ${item.id} - ${item.nome}`;
            selectIdFiltrado.appendChild(opt);
        });
    }

    window.onload = atualizarListaSelecao;
</script>

</body>
</html>
