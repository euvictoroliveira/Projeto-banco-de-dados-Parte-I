<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Dra. Yuska - atendimentos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="pagina-interna">

<div class="container">
    <a href="/" class="btn-voltar">⬅ Voltar ao Menu</a>

    <h1>Gestão Hospitalar - Dra. Yuska</h1>
    <h2>Novo atendimento</h2>

    {% if feedback %}
        {% if 'Erro' in feedback %}
            <div class="alerta alerta-erro">
                ⚠ {{ feedback }}
            </div>
        {% else %}
            <div class="alerta alerta-sucesso">
                ✔ {{ feedback }}
            </div>
        {% endif %}
    {% endif %}

    <div class="form-caixa">

        <form action="/novo_atendimento" method="POST">

            <label for="cpf">CPF paciente:</label>

            <input type="text" id="cpf" name="cpf" placeholder="Digite apenas números"
                   value="{{ cpf_buscado if cpf_buscado else '' }}">

            <label for="duracao">Duração:</label>

            <input type="text" id="duracao" name="duracao" placeholder="Duração em minutos">

            <label for="preceptor">Preceptor:</label>

            <input type="text" id="preceptor" name="preceptor" placeholder="insira o CRM">

            <label for="residente">Residente:</label>

            <input type="text" id="residente" name="residente" placeholder="insira o CRM">

            <label for="id_unidade">Unidade:</label>

            <select id="id_unidade" name="id_unidade">
                {% for id_unidade, nome in unidades %}
                <option value="{{id_unidade}}">{{ nome }}</option>
                {% endfor %}
            </select>

            <button type="submit">Enviar</button>

        </form>
    </div>
</div>

</body>
</html>
