<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Dra. Yuska - Atualizar Paciente</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="pagina-interna">

<div class="container">

    <a href="/" class="btn-voltar">⬅ Voltar ao Menu</a>

    <h1>Gestão Hospitalar - Dra. Yuska</h1>

    <h2>Atualizar Dados do Paciente</h2>

    {% if feedback %}
        {% if 'Erro' in feedback %}
            <div class="alerta alerta-erro">
                ⚠ {{ feedback }}
            </div>
        {% else %}
            <div class="alerta alerta-sucesso">
                ✔ {{ feedback }}
            </div>
        {% endif %}
    {% endif %}

    <div class="form-caixa form-vertical">

        <form action="/atualizar_paciente" method="POST">

            <label><strong>CPF do paciente</strong></label>
            <input
                type="text"
                name="cpf"
                placeholder="Digite apenas os números"
                required
            >

            <label><strong>CEP</strong></label>
            <input
                type="text"
                name="cep"
                placeholder="CEP"
            >

            <label><strong>Logradouro</strong></label>
            <input
                type="text"
                name="logradouro"
                placeholder="Rua, Avenida..."
            >

            <label><strong>Número</strong></label>
            <input
                type="text"
                name="numero"
                placeholder="Número"
            >

            <label><strong>Complemento</strong></label>
            <input
                type="text"
                name="complemento"
                placeholder="Apartamento, bloco..."
            >

            <label><strong>Bairro</strong></label>
            <input
                type="text"
                name="bairro"
                placeholder="Bairro"
            >

            <label><strong>Cidade</strong></label>
            <input
                type="text"
                name="cidade"
                placeholder="Cidade"
            >

            <label><strong>UF</strong></label>
            <input
                type="text"
                name="uf"
                maxlength="2"
                placeholder="Ex: PB"
            >

            <label><strong>Número do Convênio</strong></label>
            <input
                type="text"
                name="convenio"
                placeholder="Número do convênio"
            >

            <button type="submit">
                Atualizar Paciente
            </button>

        </form>

    </div>

</div>

</body>
</html>
