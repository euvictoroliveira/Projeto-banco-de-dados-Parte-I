<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pacientes sem Procedimentos de Alto Risco</title>

    <style>
        body{
            font-family:'Segoe UI',Arial,sans-serif;
            margin:40px;
            background:#f5f7fb;
        }

        .container{
            max-width:900px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:8px;
            box-shadow:0 4px 6px rgba(0,0,0,.1);
        }

        h1{
            color:#2c3e50;
            border-bottom:2px solid #3498db;
            padding-bottom:10px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th,td{
            border:1px solid #ddd;
            padding:10px;
        }

        th{
            background:#34495e;
            color:white;
        }

        tr:nth-child(even){
            background:#f8f8f8;
        }

        .btn-voltar{
            display:inline-block;
            margin-bottom:20px;
            padding:10px 15px;
            background:#7f8c8d;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }
    </style>

</head>
<body>

<div class="container">

    <a href="/" class="btn-voltar">⬅ Voltar</a>

    <h1>Pacientes que nunca realizaram procedimentos de risco ALTO</h1>

    <table>

        <tr>
            <th>Nome</th>
            <th>CPF</th>
        </tr>

        {% for paciente in pacientes %}

        <tr>
            <td>{{ paciente[0] }}</td>
            <td>{{ paciente[1] }}</td>
        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
